# Codemagic CI/CD for word-drop-game
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "15.0"
        APP_NAME: "word-drop-game"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/word-drop-game.git --depth 1
      - cd word-drop-game && git submodule update --init --recursive
      - cd word-drop-game && xcode-project fetch-dependencies --use-cache
      - cd word-drop-game && xcode-project build --workspace ios/App.xcworkspace --scheme App --configuration Release
    artifacts:
      - word-drop-game/ios/App/App.xcarchive
    publishing:
      app_store_connect:
        api_key: Whitefoxes
