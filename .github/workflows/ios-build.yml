name: Build iOS

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build web app
        run: npm run build
      - name: Sync Capacitor
        run: |
          npx cap sync ios
          ls ios/App/*.xcodeproj
      - name: Build iOS
        run: |
          cd ios/App
          WORKDIR=$(pwd)
          if [ -d "App.xcworkspace" ]; then
            xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -destination 'generic/platform=iOS' -derivedDataPath ./build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          else
            xcodebuild -project App.xcodeproj -scheme App -configuration Release -destination 'generic/platform=iOS' -derivedDataPath ./build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
          fi
      - name: Create IPA
        run: |
          cd ios/App
          WORKDIR=$(pwd)
          APP_PATH="$WORKDIR/build/Build/Products/Release-iphoneos/App.app"
          mkdir -p "$WORKDIR/build/Payload"
          cp -r "$APP_PATH" "$WORKDIR/build/Payload/"
          cd "$WORKDIR/build"
          zip -r App.ipa Payload
          ls -la "$WORKDIR/build/App.ipa"
      - name: Upload to App Store Connect
        run: |
          cd ios/App/build
          xcrun altool --upload-app -f App.ipa -t ios --apiKey "${{ secrets.APPSTORECONNECT_API_KEY_ID }}" --apiIssuer "${{ secrets.APPSTORECONNECT_API_KEY_ISSUER_ID }}" --uploadTimeout 600 2>&1 | tail -40
        env:
          API_KEY_FILE: ${{ secrets.APPSTORECONNECT_API_KEY_FILE }}
