name: Build & Upload iOS

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build web app
        run: npm run build
      - name: Sync Capacitor
        run: npx cap sync ios
      - name: Build iOS
        run: |
          cd ios/App
          mkdir -p build/Payload
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -destination 'generic/platform=iOS' build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | tail -20
          cp -R build/Release-iphoneos/App.app build/Payload/
          cd build && zip -r App.ipa Payload && ls -la App.ipa